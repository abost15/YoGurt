<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YoGurt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet"/>
  <style>
    /* Animatable CSS custom properties */
    @property --g1  { syntax:'<color>'; initial-value:#FEF9C3; inherits:true; }
    @property --g2  { syntax:'<color>'; initial-value:#F5D06B; inherits:true; }
    @property --tc  { syntax:'<color>'; initial-value:#3B2208; inherits:true; }
    @property --tc2 { syntax:'<color>'; initial-value:#B06820; inherits:true; }

    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --g1:#FEF9C3; --g2:#F5D06B; --tc:#3B2208; --tc2:#B06820; }

    html { scroll-behavior:smooth; }
    body { font-family:'Inter',sans-serif; min-height:100vh; }

    /* ── Fixed gradient bg ── */
    #bg {
      position:fixed; inset:0; z-index:-1;
      background:linear-gradient(150deg, var(--g1) 0%, var(--g2) 100%);
      transition:
        --g1 .9s cubic-bezier(.4,0,.2,1),
        --g2 .9s cubic-bezier(.4,0,.2,1);
    }

    /* ── White veil over bg (scroll-driven, hero only) ── */
    #hero-veil {
      position:fixed; inset:0; z-index:0;
      background:#ffffff;
      pointer-events:none;
      /* opacity set by JS */
    }

    /* ── Top-right logo ── */
    /* ── Navbar ── */
    #navbar {
      position:fixed; top:0; left:0; right:0; z-index:300;
      height:58px;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px;
      background:rgba(255,255,255,0.55);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,0.35);
      transition:background .9s, border-color .9s;
    }
    /* tint navbar with gradient when scrolled past hero */
    #navbar.tinted {
      background:rgba(var(--nb-rgb),0.45);
      border-bottom:1px solid rgba(255,255,255,0.15);
    }

    /* left: logo circle */
    #nav-logo {
      width:40px; height:40px; border-radius:50%;
      overflow:hidden; cursor:pointer; flex-shrink:0;
      box-shadow:0 2px 8px rgba(0,0,0,.13);
      transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
    }
    #nav-logo:hover { transform:scale(1.1); box-shadow:0 4px 16px rgba(0,0,0,.2); }
    #nav-logo img { width:100%; height:100%; object-fit:cover; transform:scale(1.15) translateY(-4%); pointer-events:none; }

    /* center: nav links */
    #nav-links {
      display:flex; align-items:center; gap:28px;
      position:absolute; left:50%; transform:translateX(-50%);
    }
    .nav-link {
      font-size:.72rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--tc);
      background:none; border:none; cursor:pointer;
      font-family:'Inter',sans-serif; padding:4px 0;
      position:relative; opacity:.7;
      transition:opacity .2s, color .9s;
    }
    .nav-link::after {
      content:''; position:absolute; bottom:-2px; left:0; right:0;
      height:1.5px; background:var(--tc);
      transform:scaleX(0); transform-origin:center;
      transition:transform .25s cubic-bezier(.34,1.56,.64,1), background .9s;
    }
    .nav-link:hover { opacity:1; }
    .nav-link:hover::after, .nav-link.active::after { transform:scaleX(1); }
    .nav-link.active { opacity:1; }

    /* right: social icons */
    #nav-social {
      display:flex; align-items:center; gap:14px; flex-shrink:0;
    }
    .nav-icon {
      width:18px; height:18px; color:var(--tc); opacity:.6;
      cursor:pointer; transition:opacity .2s, color .9s;
      display:flex; align-items:center; justify-content:center;
      text-decoration:none;
    }
    .nav-icon:hover { opacity:1; }
    .nav-icon svg { width:18px; height:18px; fill:currentColor; }

    /* ── Contact overlay (expands from logo) ── */
    @keyframes co-logo-in {
      0%   { opacity:0; transform:scale(.4) translateY(30px); }
      60%  { transform:scale(1.06) translateY(-4px); }
      100% { opacity:1; transform:scale(1) translateY(0); }
    }
    @keyframes co-email-in {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    #contact-overlay {
      position:fixed; inset:0; z-index:500;
      background:#fafafa;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:32px;
      clip-path:circle(0px at 44px 29px);
      transition:clip-path .6s cubic-bezier(.76,0,.24,1);
      pointer-events:none;
    }
    #contact-overlay.open {
      clip-path:circle(160% at 44px 29px);
      pointer-events:all;
    }
    #contact-overlay .co-logo {
      width:270px; height:270px; border-radius:50%;
      overflow:hidden;
      box-shadow:0 12px 48px rgba(0,0,0,.16);
      opacity:0;
    }
    #contact-overlay.open .co-logo {
      animation:co-logo-in .55s cubic-bezier(.34,1.56,.64,1) .35s forwards;
    }
    #contact-overlay .co-logo img {
      width:100%; height:100%; object-fit:cover;
      transform:scale(1.15) translateY(-4%);
    }
    #contact-overlay .co-email {
      font-size:.95rem; color:#64748b; letter-spacing:.04em;
      opacity:0;
    }
    #contact-overlay.open .co-email {
      animation:co-email-in .4s ease .7s forwards;
    }
    #contact-overlay .co-email a {
      color:#1e293b; font-weight:600; text-decoration:none;
      border-bottom:1.5px solid #1e293b; padding-bottom:1px;
      transition:opacity .2s;
    }
    #contact-overlay .co-email a:hover { opacity:.5; }
    #contact-overlay .co-close {
      position:absolute; top:22px; right:30px;
      background:none; border:none; cursor:pointer;
      width:36px; height:36px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      color:#94a3b8; font-size:1.2rem; line-height:1;
      transition:background .2s, color .2s, transform .35s cubic-bezier(.34,1.56,.64,1);
    }
    #contact-overlay .co-close:hover {
      background:#f1f5f9; color:#1e293b; transform:rotate(90deg);
    }

    /* ── Right-side section dots ── */
    #sdots {
      position:fixed; right:20px; top:50%; transform:translateY(-50%);
      z-index:200; display:flex; flex-direction:column; gap:9px;
    }
    .sdot {
      width:6px; height:6px; border-radius:50%;
      background:var(--tc); border:none; padding:0; cursor:pointer;
      opacity:.3;
      transition:opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1),
        background .9s;
    }
    .sdot.active { opacity:1; transform:scale(1.6); }
    .sdot:hover  { opacity:.6; }

    /* ── Sections ── */
    section {
      min-height:100vh; position:relative; z-index:1;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:100px 24px 60px;
      transition:filter .3s ease, opacity .3s ease;
    }

    .sec-badge {
      position:absolute; top:28px; left:32px;
      font-size:.6rem; font-weight:600; letter-spacing:.22em;
      text-transform:uppercase; color:var(--tc2);
      transition:color .9s;
    }

    /* ── Scroll blur ── */
    body.scrolling section { filter:blur(0.4px); opacity:.96; }
    body.scrolling #bg     { filter:blur(1px); }
    #bg { transition: filter .3s ease,
      --g1 .9s cubic-bezier(.4,0,.2,1),
      --g2 .9s cubic-bezier(.4,0,.2,1); }

    /* ══════════════════════════
       01 HERO — always white via veil
    ══════════════════════════ */
    #hero { text-align:center; gap:0; }

    .eyebrow {
      font-size:.68rem; font-weight:600; letter-spacing:.22em;
      text-transform:uppercase; color:#94a3b8;
      margin-bottom:16px;
    }
    .brand {
      font-family:'Playfair Display',serif; font-weight:900;
      font-size:clamp(4.5rem,14vw,9.5rem);
      letter-spacing:-.05em; line-height:.92;
      color:#1e293b;
    }
    .brand em { font-style:italic; font-weight:700; }
    .slogan {
      margin-top:16px; font-size:clamp(.85rem,2vw,1.05rem);
      font-weight:400; letter-spacing:.06em; color:#64748b;
    }
    .hero-btn {
      margin-top:48px;
      display:inline-flex; align-items:center; gap:9px;
      font-family:'Inter',sans-serif; font-size:.78rem;
      font-weight:600; letter-spacing:.1em; text-transform:uppercase;
      color:#1e293b; background:transparent;
      border:1.5px solid #1e293b; padding:13px 30px;
      border-radius:100px; cursor:pointer;
      transition:background .2s, color .2s, transform .25s cubic-bezier(.34,1.56,.64,1);
    }
    .hero-btn:hover { background:#1e293b; color:#fff; transform:translateY(-3px); }
    .hero-btn:active { transform:translateY(0); }
    .hero-btn svg {
      width:14px; height:14px; stroke:currentColor;
      stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; fill:none;
      animation:bob 2s ease-in-out infinite;
    }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)} }

    /* ══════════════════════════
       02 SMAKER
    ══════════════════════════ */
    #smaker { gap:0; overflow:hidden; }

    .smaker-title {
      font-family:'Playfair Display',serif; font-weight:900;
      font-size:clamp(1.8rem,4vw,2.6rem); letter-spacing:-.03em;
      color:var(--tc); margin-bottom:36px; flex-shrink:0;
      transition:color .9s;
    }

    .slider-row {
      display:flex; align-items:center;
      width:100%; max-width:720px; position:relative;
    }

    .arr {
      background:none; border:none; cursor:pointer;
      padding:12px; color:var(--tc); opacity:.5; flex-shrink:0;
      transition:opacity .2s, color .9s; line-height:0;
    }
    .arr:hover  { opacity:1; }
    .arr:active { opacity:.4; }
    .arr svg {
      width:38px; height:38px;
      stroke:currentColor; stroke-width:3;
      stroke-linecap:round; stroke-linejoin:round; fill:none; display:block;
    }

    .slide-viewport {
      flex:1; overflow:hidden; position:relative;
      height:clamp(340px,55vh,480px);
    }

    .fslide {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      will-change:transform;
    }
    .fslide.from-right { transform:translateX(100%); }
    .fslide.from-left  { transform:translateX(-100%); }
    .fslide.active     { transform:translateX(0); }
    .fslide.exit-left  { transform:translateX(-100%); }
    .fslide.exit-right { transform:translateX(100%); }
    .fslide.animating  { transition:transform .55s cubic-bezier(.4,0,.2,1); }

    /* glass card */
    .flavor-card {
      background:rgba(255,255,255,.18);
      backdrop-filter:blur(28px) saturate(1.4);
      -webkit-backdrop-filter:blur(28px) saturate(1.4);
      border:1px solid rgba(255,255,255,.3);
      border-radius:28px; padding:44px 40px 36px;
      width:min(520px,90vw); text-align:center;
      display:flex; flex-direction:column; align-items:center;
    }
    .card-emoji {
      font-size:clamp(3rem,7vw,4.5rem); margin-bottom:18px;
      filter:drop-shadow(0 6px 18px rgba(0,0,0,.14)); line-height:1;
    }
    .card-name {
      font-family:'Playfair Display',serif; font-weight:900;
      font-size:clamp(1.8rem,4.5vw,2.6rem);
      letter-spacing:-.04em; line-height:1.05;
      color:var(--tc); margin-bottom:10px; transition:color .9s;
    }
    .card-desc {
      font-size:.92rem; line-height:1.72; font-weight:400;
      color:var(--tc2); max-width:340px; margin-bottom:22px;
      transition:color .9s;
    }
    .card-badge {
      display:inline-block; font-size:.72rem; font-weight:600;
      letter-spacing:.1em; text-transform:uppercase;
      color:var(--tc); background:rgba(255,255,255,.22);
      padding:6px 18px; border-radius:100px;
      border:1px solid rgba(255,255,255,.3);
      transition:color .9s;
    }

    .slider-footer {
      margin-top:22px; display:flex; align-items:center; gap:14px;
      flex-shrink:0;
    }
    .fdot {
      width:6px; height:6px; border-radius:50%;
      background:var(--tc2); border:none; padding:0; cursor:pointer; opacity:.5;
      transition:opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1), background .9s;
    }
    .fdot.active { opacity:1; transform:scale(1.6); background:var(--tc); }
    .fdot:hover  { opacity:.75; }
    .slide-counter {
      font-size:.68rem; font-weight:600; letter-spacing:.14em;
      color:var(--tc2); transition:color .9s;
    }

    /* ══════════════════════════
       03 SALGSTIDER
    ══════════════════════════ */
    #salgstider { text-align:center; }

    .sec-title {
      font-family:'Playfair Display',serif; font-weight:900;
      font-size:clamp(2rem,5vw,3rem); letter-spacing:-.04em;
      color:var(--tc); margin-bottom:8px; transition:color .9s;
    }
    .sec-sub {
      font-size:.75rem; font-weight:500; letter-spacing:.12em;
      text-transform:uppercase; color:var(--tc2);
      margin-bottom:36px; transition:color .9s;
    }

    .timetable { display:flex; flex-direction:column; gap:10px; width:100%; max-width:420px; }

    .trow {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 20px; border-radius:12px;
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(8px);
    }
    .trow.today {
      background:rgba(255,255,255,.3);
      border-color:var(--tc);
      outline:1px solid var(--tc); outline-offset:-1px;
    }
    .trow.closed { opacity:.5; }

    .tday {
      font-size:.88rem; font-weight:700;
      color:var(--tc); min-width:84px; text-align:left;
      transition:color .9s;
    }
    .trow.today .tday { color:var(--tc); }

    .tclock {
      font-size:.88rem; font-weight:500;
      color:var(--tc2); font-variant-numeric:tabular-nums;
      transition:color .9s;
    }
    .trow.closed .tclock { color:#ef4444 !important; font-weight:600; }

    .tbadge {
      font-size:.6rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase;
      background:#16a34a; color:#fff;
      padding:4px 10px; border-radius:100px;
    }
    .tloc {
      margin-top:24px; font-size:.78rem; font-weight:500;
      color:var(--tc2); letter-spacing:.05em; transition:color .9s;
    }

    /* admin time edit */
    body.admin .tclock { cursor:pointer; outline:1px dashed rgba(128,128,128,.4); border-radius:4px; padding:0 4px; }
    .toggle-closed { display:none; }

    /* ══════════════════════════
       04 SMAKER UNDER SALG
    ══════════════════════════ */
    #salg { text-align:center; padding-bottom:100px; }

    .flavor-grid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:12px; width:100%; max-width:540px;
    }
    .fcard {
      display:flex; flex-direction:column; align-items:center; gap:8px;
      padding:22px 12px 18px; border-radius:18px;
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.15);
      backdrop-filter:blur(12px);
      transition:background .2s, transform .25s cubic-bezier(.34,1.56,.64,1);
    }
    .fcard:hover { background:rgba(255,255,255,.28); transform:translateY(-3px); }
    .fcard.unavail { opacity:.45; }
    .fcard.unavail:hover { transform:none; }
    .fcard-emoji { font-size:1.9rem; line-height:1; }
    .fcard-name {
      font-size:.74rem; font-weight:600; color:var(--tc);
      text-align:center; line-height:1.3; transition:color .9s;
    }
    .fcard-status {
      font-size:.6rem; font-weight:700; letter-spacing:.08em;
      text-transform:uppercase; padding:4px 10px; border-radius:100px;
      background:#16a34a; color:#fff;
    }
    .fcard-status.off { background:#dc2626; }

    body.admin .fcard { cursor:pointer; }
    body.admin .fcard::after {
      content:'Klikk for å endre'; font-size:.55rem;
      color:var(--tc2); display:block; transition:color .9s;
    }

    /* ══════════════════════════
       FOOTER
    ══════════════════════════ */
    footer {
      text-align:center; padding:28px 24px 40px;
      position:relative; z-index:1;
    }
    .footer-txt { font-size:.7rem; color:var(--tc2); letter-spacing:.08em; transition:color .9s; }
    .footer-email {
      display:block; margin-top:6px;
      font-size:.68rem; color:var(--tc2); letter-spacing:.08em;
      text-decoration:none; opacity:.55;
      transition:opacity .2s, color .9s;
    }
    .footer-email:hover { opacity:1; }
    #admin-link {
      position:fixed; bottom:18px; left:18px; z-index:600;
      width:7px; height:7px; border-radius:50%;
      background:#94a3b8; opacity:0; pointer-events:none;
      cursor:pointer; border:none; padding:0;
      transition:opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    body.contact-open #admin-link {
      opacity:.25; pointer-events:all;
    }
    #admin-link:hover { opacity:.7; transform:scale(1.5); }


    @media(max-width:600px){
      .slide-viewport { height:clamp(300px,60vw,380px); }
      .flavor-card { padding:32px 24px 28px; }
      .flavor-grid { grid-template-columns:repeat(2,1fr); max-width:320px; }
      #sdots { right:8px; }
      .arr svg { width:30px; height:30px; }
      .sec-badge { left:20px; }
    }
    @media(prefers-reduced-motion:reduce){
      .fslide.animating { transition-duration:.01ms!important; }
      .hero-btn svg { animation:none; }
      section { transition:none; }
    }
  </style>
</head>
<body>

<div id="bg"></div>
<div id="hero-veil"></div>
<header id="navbar">
  <!-- left: logo -->
  <div id="nav-logo"><img src="IMG_0506.JPEG" alt="YoGurt logo"/></div>

  <!-- center: links -->
  <nav id="nav-links">
    <button class="nav-link active" onclick="toSection('hero')">Hjem</button>
    <button class="nav-link" onclick="toSection('smaker')">Smaker</button>
    <button class="nav-link" onclick="toSection('salgstider')">Salgstider</button>
    <button class="nav-link" onclick="toSection('salg')">I dag</button>
  </nav>

  <!-- right: social icons -->
  <div id="nav-social">

    </a>
    <a class="nav-icon" href="https://tiktok.com" target="_blank" aria-label="TikTok">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>

<!-- ══ 01 HERO ══ -->
<section id="hero">

<section id="salg">
  <div class="sec-badge">04 — I dag</div>
  <div class="sec-title">Smaker under salg</div>
  <div class="sec-sub">Tilgjengelig i dag</div>
  <div class="flavor-grid" id="salg-grid"></div>
</section>

<footer>
  <div class="footer-txt">© 2026 YoGurt Elevbedrift</div>
  <a class="footer-email" href="mailto:yogurteb5@gmail.com">yogurteb5@gmail.com</a>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
/* ── Firebase ─────────────────────────── */
firebase.initializeApp({
  apiKey: "AIzaSyDqh-jXM82F7-qB0Ug7PeVmazdlpmpdNXQ",
  authDomain: "yogurt-f0fa7.firebaseapp.com",
  databaseURL: "https://yogurt-f0fa7-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "yogurt-f0fa7",
  storageBucket: "yogurt-f0fa7.firebasestorage.app",
  messagingSenderId: "551580292785",
  appId: "1:551580292785:web:9a125688c28dae507af490"
});
const db = firebase.database();

/* ── Data ─────────────────────────────── */
const DEFAULT = {
  flavors: [
    { emoji:'🍦', name:'Classic Vanilla',  badge:'Kremet',   desc:'En klassisk favoritt med ekte vaniljesmak og silkemyk tekstur.', available:true,  g1:'#FEF9C3', g2:'#F5D06B', tc:'#3B2208', tc2:'#A06020' },
    { emoji:'🥭', name:'Mango Delight',    badge:'Fruktig',  desc:'Søt og saftig mango fra solrike troper, blandet til perfeksjon.',  available:true,  g1:'#FFEDD5', g2:'#FB923C', tc:'#5C1A08', tc2:'#B04020' },
    { emoji:'🍫', name:'Chocolate Deluxe', badge:'Intens',   desc:'Mørk belgisk sjokolade møter kremete yogurt for ultimate nytelse.',available:false, g1:'#3D1409', g2:'#0A0200', tc:'#FEF3C7', tc2:'#D4A870' },
    { emoji:'🫙', name:'Greek Yogurt',     badge:'Naturlig', desc:'Naturlig gresk yogurt – frisk, syrlig og full av protein.',        available:true,  g1:'#F8FAFC', g2:'#CBD5E1', tc:'#1E293B', tc2:'#475569' },
    { emoji:'🌴', name:'Tropical Freeze',  badge:'Eksotisk', desc:'En eksplosjon av tropiske frukter – ananas, kokos og lime.',        available:false, g1:'#CCFBF1', g2:'#0F9488', tc:'#042F2E', tc2:'#1A7A70' },
    { emoji:'🫐', name:'Forest Berry',     badge:'Vill',     desc:'Blåbær, bringebær og jordbær fra norske skoger og enger.',         available:true,  g1:'#4C1D95', g2:'#1E0938', tc:'#EDE9FE', tc2:'#C4B0F0' },
  ],
  times: [
    { day:'Mandag',  dayNum:1, time:'11:15 – 12:00', closed:false },
    { day:'Tirsdag', dayNum:2, time:'11:15 – 12:00', closed:false },
    { day:'Onsdag',  dayNum:3, time:'11:15 – 12:00', closed:false },
    { day:'Torsdag', dayNum:4, time:'Stengt',         closed:true  },
    { day:'Fredag',  dayNum:5, time:'11:15 – 12:30', closed:false },
  ]
};


let flavors = DEFAULT.flavors;
let times   = DEFAULT.times;

// Listen for real-time updates from Firebase
db.ref('yogurt-data').on('value', snap => {
  const d = snap.val();
  if (d && d.flavors && d.times) {
    d.flavors.forEach((f,i) => { if(!f.tc2) f.tc2 = DEFAULT.flavors[i]?.tc2 || f.tc; });
    flavors = d.flavors;
    times   = d.times;
  }
  renderTimetable();
  renderSalg();
});

/* ── Hero veil (scroll-driven fade) ── */
const veil    = document.getElementById('hero-veil');
const heroEl  = document.getElementById('hero');

function updateVeil() {
  const heroH   = heroEl.offsetHeight;
  const scrollY = window.scrollY;
  // fade out over first 60% of hero height
  const opacity = Math.max(0, 1 - scrollY / (heroH * 0.6));
  veil.style.opacity = opacity;
}
updateVeil();
window.addEventListener('scroll', updateVeil, { passive:true });

/* ── Section nav dots ── */
const sectionIds  = ['hero','smaker','salgstider','salg'];
const sectionLbls = ['Hjem','Smaker','Salgstider','Under salg'];
const sdotsEl     = document.getElementById('sdots');

sectionIds.forEach((id, i) => {
  const d = document.createElement('button');
  d.className = 'sdot'; d.setAttribute('aria-label', sectionLbls[i]);
  d.addEventListener('click', () => toSection(id));
  sdotsEl.appendChild(d);
});

function toSection(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }

const navLinks = document.querySelectorAll('.nav-link');
const navbar   = document.getElementById('navbar');

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    const idx = sectionIds.indexOf(e.target.id);
    if (idx >= 0) {
      sdotsEl.querySelectorAll('.sdot').forEach((d,i) => d.classList.toggle('active', i===idx));
      navLinks.forEach((l,i) => l.classList.toggle('active', i===idx));
      navbar.classList.toggle('tinted', idx > 0);
    }
  });
}, { threshold: 0.5 });
sectionIds.forEach(id => io.observe(document.getElementById(id)));

/* ── Scroll blur ── */
let scrollT;
window.addEventListener('scroll', () => {
  document.body.classList.add('scrolling');
  clearTimeout(scrollT);
  scrollT = setTimeout(() => document.body.classList.remove('scrolling'), 120);
}, { passive:true });

/* ── Flavor slider ── */
const viewport = document.getElementById('viewport');
const fdotsEl  = document.getElementById('fdots');
const counter  = document.getElementById('counter');
let   cur = 0, busy = false;

function applyColors(idx) {
  const f = flavors[idx], r = document.documentElement;
  r.style.setProperty('--g1',  f.g1);
  r.style.setProperty('--g2',  f.g2);
  r.style.setProperty('--tc',  f.tc);
  r.style.setProperty('--tc2', f.tc2);
}

function makeSlide(idx) {
  const f  = flavors[idx];
  const el = document.createElement('div');
  el.className = 'fslide'; el.dataset.idx = idx;
  el.innerHTML = `
    <div class="flavor-card">
      <div class="card-emoji">${f.emoji}</div>
      <div class="card-name">${f.name}</div>
      <p class="card-desc">${f.desc}</p>
      <div class="card-badge">${f.badge}</div>
    </div>`;
  return el;
}

flavors.forEach((f, i) => {
  const d = document.createElement('button');
  d.className = 'fdot' + (i===0?' active':'');
  d.setAttribute('aria-label', f.name);
  d.addEventListener('click', () => { if(i!==cur) goFlavor(i, i>cur?'right':'left'); });
  fdotsEl.appendChild(d);
});

const first = makeSlide(0); first.classList.add('active');
viewport.appendChild(first);
applyColors(0);

function goFlavor(idx, dir) {
  if (busy || idx===cur) return; busy=true;
  const old = viewport.querySelector('.fslide.active');
  const nw  = makeSlide(idx);
  nw.classList.add(dir==='right'?'from-right':'from-left');
  viewport.appendChild(nw); nw.getBoundingClientRect();
  old.classList.add('animating', dir==='right'?'exit-left':'exit-right');
  nw.classList.add('animating','active'); nw.classList.remove('from-right','from-left');
  applyColors(idx); cur=idx;
  fdotsEl.querySelectorAll('.fdot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  counter.textContent=`${idx+1} / ${flavors.length}`;
  old.addEventListener('transitionend',()=>{old.remove();busy=false;},{once:true});
}

document.getElementById('btn-next').addEventListener('click',()=>goFlavor((cur+1)%flavors.length,'right'));
document.getElementById('btn-prev').addEventListener('click',()=>goFlavor((cur-1+flavors.length)%flavors.length,'left'));
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') goFlavor((cur+1)%flavors.length,'right');
  if(e.key==='ArrowLeft')  goFlavor((cur-1+flavors.length)%flavors.length,'left');
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].screenX-tx;
  if(Math.abs(dx)>50) dx<0?goFlavor((cur+1)%flavors.length,'right'):goFlavor((cur-1+flavors.length)%flavors.length,'left');
},{passive:true});

/* ── Timetable ── */
const today = new Date().getDay();
function renderTimetable() {
  const el=document.getElementById('timetable'); el.innerHTML='';
  times.forEach(t=>{
    const row=document.createElement('div');
    row.className='trow'+(t.closed?' closed':'')+(t.dayNum===today?' today':'');
    row.innerHTML=`<span class="tday">${t.day}</span><span class="tclock">${t.time}</span>`;
    if(t.dayNum===today && !t.closed){
      const b=document.createElement('span'); b.className='tbadge'; b.textContent='I dag';
      row.appendChild(b);
    }
    el.appendChild(row);
  });
}
renderTimetable();

/* ── Salg grid ── */
function renderSalg() {
  const el=document.getElementById('salg-grid'); el.innerHTML='';
  flavors.forEach((f,i)=>{
    const card=document.createElement('div');
    card.className='fcard'+(!f.available?' unavail':'');
    card.dataset.idx=i;
    card.innerHTML=`
      <div class="fcard-emoji">${f.emoji}</div>
      <div class="fcard-name">${f.name}</div>
      <div class="fcard-status ${!f.available?'off':''}">${f.available?'Tilgjengelig':'Utilgjengelig'}</div>`;
    el.appendChild(card);
  });
}
renderSalg();

/* ── Admin ── */
document.getElementById('admin-link').addEventListener('click', () => {
  window.location.href = 'admin.html';
});

// ── Contact overlay ──
const contactOverlay = document.getElementById('contact-overlay');
function openContact() {
  // reset animations so they replay
  contactOverlay.querySelectorAll('.co-logo,.co-email').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = '';
  });
  contactOverlay.classList.add('open');
  document.body.classList.add('contact-open');
}
function closeContact() {
  contactOverlay.classList.remove('open');
  document.body.classList.remove('contact-open');
}
document.getElementById('nav-logo').addEventListener('click', openContact);
contactOverlay.querySelector('.co-close').addEventListener('click', closeContact);
contactOverlay.addEventListener('click', e => { if (e.target === contactOverlay) closeContact(); });
</script>
</body>
